<div>
    <label for="inf_input_example_select" class="example-label"><b>Examples:</b></label>
    <select id="inf_input_example_select" class="example-select" style="text-align: center; text-align-last: center;">
        <option value="">-- Select --</option>
        <option value="SAVs of multiple proteins for inferencing">SAVs of multiple proteins for inferencing</option>
        <option value="PKD1/2 SAVs for transfer learning">PKD1/2 SAVs for transfer learning</option>
        <option value="GJB2 SAVs for transfer learning">GJB2 SAVs for transfer learning</option>
    </select>

    <button class="view-output-btn" onclick="
        const v = document.getElementById('inf_input_example_select').value;
        const infSelect = document.getElementById('inf_input_example_select');
        const tfSelect = document.getElementById('tf_input_example_select');
        const infBridge = document.getElementById('inf_input_example');
        const tfBridge = document.getElementById('tf_input_example');
        if (infSelect) infSelect.value = v;
        if (tfSelect) tfSelect.value = v;
        if (infBridge) {
            infBridge.value = v;
            infBridge.dispatchEvent(new Event('input', { bubbles: true }));
        }
        if (tfBridge) {
            tfBridge.value = v;
            tfBridge.dispatchEvent(new Event('input', { bubbles: true }));
        }
        document.getElementById('inf_input_load')?.click();">
            Load input
    </button>

    <button class="view-output-btn" onclick="
        const v = document.getElementById('inf_input_example_select').value;
        const infSelect = document.getElementById('inf_input_example_select');
        const tfSelect = document.getElementById('tf_input_example_select');
        const infBridge = document.getElementById('inf_input_example');
        const tfBridge = document.getElementById('tf_input_example');
        if (infSelect) infSelect.value = v;
        if (tfSelect) tfSelect.value = v;
        if (infBridge) {
            infBridge.value = v;
            infBridge.dispatchEvent(new Event('input', { bubbles: true }));
        }
        if (tfBridge) {
            tfBridge.value = v;
            tfBridge.dispatchEvent(new Event('input', { bubbles: true }));
        }
        document.getElementById('inf_output_view')?.click();">
            View output
    </button>

    <button class="clear-input-btn"
        onclick="
            const infSelect = document.getElementById('inf_input_example_select');
            const tfSelect = document.getElementById('tf_input_example_select');
            const infBridge = document.getElementById('inf_input_example');
            const tfBridge = document.getElementById('tf_input_example');
            if (infSelect) infSelect.value = '';
            if (tfSelect) tfSelect.value = '';
            if (infBridge) {
                infBridge.value = '';
                infBridge.dispatchEvent(new Event('input', { bubbles: true }));
            }
            if (tfBridge) {
                tfBridge.value = '';
                tfBridge.dispatchEvent(new Event('input', { bubbles: true }));
            }
            document.getElementById('inf_clear_btn')?.click();
        ">
        Clear all
    </button>
</div>
