<div class="results-side-card">
    <div class="session-row results-side-meta">
        <span class="session-label">Session:</span>
        <span
            class="session-id"
            onclick="
                navigator.clipboard?.writeText(this.textContent?.trim() || '');
                this.classList.add('copied');
                const hint = this.parentElement.querySelector('.copy-hint');
                if (hint) {{
                    hint.textContent = '(copied)';
                    hint.classList.add('copied');
                }}
                setTimeout(() => {{
                    this.classList.remove('copied');
                    if (hint) {{
                        hint.textContent = '(click to copy)';
                        hint.classList.remove('copied');
                    }}
                }}, 900);
            "
            title="Click to copy"
        >{session_id}</span>
        <span class="copy-hint">(click to copy)</span>
    </div>
    <div class="job-row results-side-meta">
        <label class="job-label" for="job-select">Job:</label>
        <select id="job-select" class="example-select results-job-select" onchange="if (this.value) window.location.assign(this.value);">
            {options}
        </select>
    </div>
    <div class="results-side-note">
        <div class="result-refresh-hint">Refresh the page in 10s</div>
        <div class="result-retention-note">Jobs are deleted automatically after 60 days.</div>
    </div>
    <div class="result-actions-row results-side-actions">
        {new_job_html}
        {cancel_job_html}
    </div>
</div>
